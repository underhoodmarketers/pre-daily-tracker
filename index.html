<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily workout &amp; nutrition tracker</title>
<style>
  :root {
    --bg: #fdfaf6;
    --card: #ffffff;
    --border: #e8e1d8;
    --text: #2c2420;
    --text-secondary: #756a60;
    --magenta: #b3286e;
    --saffron: #e0791f;
    --gold: #c79a2f;
    --magenta-light: #f7e7ef;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: var(--bg);
    color: var(--text);
    padding: 24px 16px 60px;
  }
  .wrap { max-width: 720px; margin: 0 auto; }
  h1 {
    font-size: 22px;
    font-weight: 600;
    margin: 0 0 4px;
    color: var(--magenta);
  }
  .subtitle { font-size: 14px; color: var(--text-secondary); margin: 0 0 24px; }
  .tabs { display: flex; gap: 8px; margin-bottom: 20px; border-bottom: 1px solid var(--border); }
  .tab-btn {
    border: none; background: none; padding: 10px 4px; font-size: 14px;
    color: var(--text-secondary); cursor: pointer; border-bottom: 2px solid transparent;
  }
  .tab-btn.active { color: var(--magenta); border-bottom-color: var(--magenta); font-weight: 600; }
  .day-grid {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 8px; margin-bottom: 24px;
  }
  .day-btn {
    border: 1px solid var(--border); background: var(--card); border-radius: 10px;
    padding: 10px 8px; font-size: 14px; cursor: pointer; color: var(--text);
  }
  .day-btn.selected {
    border: 2px solid var(--magenta); background: var(--magenta-light); color: var(--magenta); font-weight: 600;
  }
  .metrics {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 10px; margin-bottom: 24px;
  }
  .metric-card { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 12px; }
  .metric-label { font-size: 12px; color: var(--text-secondary); margin: 0 0 4px; }
  .metric-value { font-size: 17px; font-weight: 600; margin: 0; }
  .section-label { font-size: 13px; color: var(--text-secondary); margin: 0 0 8px; font-weight: 600; }
  .food-list { display: flex; flex-direction: column; gap: 6px; margin-bottom: 16px; }
  .food-row {
    display: flex; align-items: center; justify-content: space-between; gap: 8px;
    padding: 10px 12px; border: 1px solid var(--border); border-radius: 10px;
    background: var(--card); cursor: pointer;
  }
  .food-row input[type=checkbox] { width: 17px; height: 17px; accent-color: var(--magenta); }
  .food-name { font-size: 14px; }
  .food-stats { font-size: 12px; color: var(--text-secondary); white-space: nowrap; }
  .add-row { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; border-top: 1px solid var(--border); padding-top: 14px; }
  input[type=text], input[type=number] {
    border: 1px solid var(--border); border-radius: 8px; padding: 9px 10px; font-size: 14px;
  }
  #new-name { flex: 2; min-width: 120px; }
  #new-cal, #new-protein { flex: 1; min-width: 80px; }
  button.add-btn {
    background: var(--magenta); color: #fff; border: none; border-radius: 8px;
    padding: 10px 16px; font-size: 14px; cursor: pointer; font-weight: 600;
  }
  button.add-btn:hover { background: #94215a; }
  #save-status { font-size: 12px; color: var(--text-secondary); margin: 10px 0 0; }
  .week-row {
    display: flex; align-items: center; justify-content: space-between; gap: 8px;
    padding: 12px; border: 1px solid var(--border); border-radius: 10px; background: var(--card);
    margin-bottom: 8px; flex-wrap: wrap;
  }
  .week-day { font-size: 14px; font-weight: 600; min-width: 90px; }
  .week-type { font-size: 13px; color: var(--text-secondary); flex: 1; }
  .week-stats { font-size: 13px; color: var(--text-secondary); }
  .remove-btn {
    border: none; background: none; color: var(--text-secondary); cursor: pointer;
    font-size: 14px; padding: 2px 6px;
  }
</style>
</head>
<body>
<div class="wrap">
  <h1>Daily tracker</h1>
  <p class="subtitle">Pick today's workout, log what you eat, see what's left.</p>

  <div class="tabs">
    <button class="tab-btn active" id="tab-today">Today</button>
    <button class="tab-btn" id="tab-week">This week</button>
  </div>

  <div id="view-today">
    <p class="section-label">Today's workout</p>
    <div class="day-grid" id="day-buttons"></div>

    <div class="metrics" id="metrics"></div>

    <p class="section-label">Workout plan</p>
    <div id="workout-plan" style="margin-bottom: 24px;"></div>

    <p class="section-label">Daily wellness</p>
    <div id="wellness-list" style="display:flex; flex-direction:column; gap:6px; margin-bottom:24px;"></div>

    <div style="display:flex; align-items:center; justify-content:space-between; gap:8px; flex-wrap:wrap; margin-bottom:8px;">
      <p class="section-label" style="margin:0;">Food log — check what you've eaten</p>
      <button id="smart-update-btn" style="font-size:12px; padding:6px 10px; border-radius:8px; border:1px solid var(--border); background:var(--card); cursor:pointer; color:var(--magenta);">Update list from my habits</button>
    </div>
    <p id="smart-update-status" style="font-size:12px; color: var(--text-secondary); margin: 0 0 10px;"></p>
    <div class="food-list" id="food-list"></div>

    <div class="add-row">
      <input type="text" id="new-name" placeholder="Food name">
      <input type="number" id="new-cal" placeholder="Calories">
      <input type="number" id="new-protein" placeholder="Protein (g)">
      <button class="add-btn" id="add-food-btn">Add food</button>
    </div>
    <p id="save-status"></p>
  </div>

  <div id="view-week" style="display:none;">
    <div id="week-list"></div>
  </div>
</div>

<script>
const STORAGE_PREFIX = 'holisticrhythm-tracker-';
const SPLIT_LOG_KEY = 'holisticrhythm-tracker-split-log';
const FOOD_LIBRARY_KEY = 'holisticrhythm-tracker-food-library';

function loadFoodLibrary() {
  try {
    const raw = localStorage.getItem(FOOD_LIBRARY_KEY);
    if (raw) return JSON.parse(raw);
  } catch (e) { /* fall through to seed */ }
  const seeded = defaultFoods.map(f => ({ ...f }));
  saveFoodLibrary(seeded);
  return seeded;
}

function saveFoodLibrary(library) {
  try { localStorage.setItem(FOOD_LIBRARY_KEY, JSON.stringify(library)); } catch (e) { /* ignore */ }
}

function newDayFoods() {
  return loadFoodLibrary().map(f => ({ ...f, checked: false }));
}

const strengthSplits = [
  { name: 'Push', detail: 'Chest, shoulders, triceps', exercises: [
    'Barbell or dumbbell bench press — 4 x 8-10',
    'Seated overhead press — 3 x 8-10',
    'Incline dumbbell press — 3 x 10-12',
    'Lateral raises — 3 x 12-15',
    'Tricep pushdown — 3 x 12-15',
    'Push-ups — 2 x to near failure'
  ]},
  { name: 'Legs', detail: 'Quads, hamstrings, glutes, calves', exercises: [
    'Back or goblet squat — 4 x 8-10',
    'Romanian deadlift — 3 x 10-12',
    'Walking lunges — 3 x 12 per leg',
    'Leg press — 3 x 10-12',
    'Glute bridge or hip thrust — 3 x 12-15',
    'Standing calf raises — 3 x 15-20'
  ]},
  { name: 'Pull', detail: 'Back, biceps', exercises: [
    'Deadlift or rack pull — 4 x 6-8',
    'Lat pulldown or pull-ups — 3 x 8-10',
    'Seated cable row — 3 x 10-12',
    'Face pulls — 3 x 15',
    'Bicep curls — 3 x 12-15',
    'Back extensions — 2 x 12-15'
  ]},
  { name: 'Full body + core', detail: 'Compound lifts, core', exercises: [
    'Kettlebell swings — 4 x 15',
    'Goblet squats — 3 x 12',
    'Push-ups — 3 x 12-15',
    'Plank — 3 x 30-45 sec',
    'Russian twists — 3 x 20',
    'Mountain climbers — 3 x 30 sec'
  ]}
];

const otherWorkoutPlans = {
  zumba: ['Bollywood Zumba class', 'Optional 5-10 min core finisher after class'],
  rest: ['Light mobility or stretching — 10-15 min', 'Easy walk, optional']
};

const wellnessItems = [
  { id: 'water', label: 'Water intake', type: 'counter', goal: 8, unit: 'cups' },
  { id: 'dryBrushing', label: 'Dry brushing', type: 'check' },
  { id: 'foamRolling', label: 'Foam rolling / mobility', type: 'check' },
  { id: 'stretching', label: 'Post-workout stretching', type: 'check' },
  { id: 'sleep', label: '7+ hours sleep last night', type: 'check' }
];

function defaultWellness() {
  const w = {};
  wellnessItems.forEach(item => { w[item.id] = item.type === 'counter' ? 0 : false; });
  return w;
}

function loadSplitLog() {
  try {
    const raw = localStorage.getItem(SPLIT_LOG_KEY);
    return raw ? JSON.parse(raw) : [];
  } catch (e) { return []; }
}

function saveSplitLog(log) {
  try { localStorage.setItem(SPLIT_LOG_KEY, JSON.stringify(log)); } catch (e) { /* ignore */ }
}

function todayDateStr() {
  return new Date().toISOString().slice(0, 10);
}

function getSuggestedSplit() {
  const log = loadSplitLog().filter(e => e.date !== todayDateStr());
  if (log.length === 0) return strengthSplits[0].name;
  log.sort((a, b) => (a.date < b.date ? 1 : -1));
  const lastIdx = strengthSplits.findIndex(s => s.name === log[0].split);
  const nextIdx = lastIdx === -1 ? 0 : (lastIdx + 1) % strengthSplits.length;
  return strengthSplits[nextIdx].name;
}

function upsertSplitLog(splitName) {
  const log = loadSplitLog().filter(e => e.date !== todayDateStr());
  log.push({ date: todayDateStr(), split: splitName });
  saveSplitLog(log);
}

function removeTodaySplitLog() {
  const log = loadSplitLog().filter(e => e.date !== todayDateStr());
  saveSplitLog(log);
}

const dayTypes = [
  { id: 'rest', label: 'Rest day', calories: 1550, protein: 110, workouts: ['Rest — recovery day'] },
  { id: 'zumba', label: 'Zumba only', calories: 1700, protein: 120, workouts: ['Bollywood Zumba class'] },
  { id: 'strength', label: 'Strength only', calories: 1750, protein: 130, workouts: ['Strength training session'] },
  { id: 'both', label: 'Strength + Zumba', calories: 1900, protein: 140, workouts: ['Strength training session', 'Bollywood Zumba class'] }
];

const defaultFoods = [
  { name: 'Chia seeds soaked overnight + lime + sea salt', calories: 80, protein: 3, time: '6:45am' },
  { name: '10 soaked golden raisins', calories: 60, protein: 1, time: '6:45am' },
  { name: '2-3 boiled eggs (post-workout)', calories: 210, protein: 18, time: '9-10am' },
  { name: 'Oikos Pro yogurt', calories: 160, protein: 25, time: '9-10am' },
  { name: 'Mixed berries, half apple, almonds', calories: 220, protein: 6, time: '12-1pm' },
  { name: 'Omelette — 2 eggs, egg whites, cheese', calories: 280, protein: 26, time: '3pm' },
  { name: 'Half banana', calories: 55, protein: 1, time: '5pm, pre-Zumba' },
  { name: 'Isopure Clear protein (Zumba)', calories: 90, protein: 20, time: '5pm, pre-Zumba' },
  { name: 'Chicken, 100-150g', calories: 250, protein: 40, time: '8pm dinner' },
  { name: 'Sona Masuri rice, 1 cup', calories: 200, protein: 4, time: '8pm dinner' },
  { name: 'Moong dal, 1 cup', calories: 150, protein: 9, time: '8pm dinner' },
  { name: 'Vegetables', calories: 60, protein: 3, time: '8pm dinner' }
];

function dateKey(offsetDays) {
  const d = new Date();
  d.setDate(d.getDate() - (offsetDays || 0));
  return STORAGE_PREFIX + d.toISOString().slice(0, 10);
}
function labelForOffset(offset) {
  const d = new Date();
  d.setDate(d.getDate() - offset);
  return offset === 0 ? 'Today' : d.toLocaleDateString(undefined, { weekday: 'short', month: 'short', day: 'numeric' });
}

let state = { day: 'zumba', foods: newDayFoods(), split: null, wellness: defaultWellness() };

function loadToday() {
  try {
    const raw = localStorage.getItem(dateKey(0));
    if (raw) {
      const parsed = JSON.parse(raw);
      if (parsed && parsed.day && Array.isArray(parsed.foods)) {
        state = parsed;
        if (!state.wellness) state.wellness = defaultWellness();
      }
    }
  } catch (e) { /* use defaults */ }
  ensureSplitForToday();
  renderAll();
}

function saveToday() {
  try {
    localStorage.setItem(dateKey(0), JSON.stringify(state));
    document.getElementById('save-status').textContent = 'Saved';
  } catch (e) {
    document.getElementById('save-status').textContent = 'Could not save in this browser.';
  }
}

function ensureSplitForToday() {
  const includesStrength = state.day === 'strength' || state.day === 'both';
  if (includesStrength) {
    if (!state.split) {
      state.split = getSuggestedSplit();
    }
    upsertSplitLog(state.split);
  } else {
    state.split = null;
    removeTodaySplitLog();
  }
}

function renderDayButtons() {
  const el = document.getElementById('day-buttons');
  el.innerHTML = dayTypes.map(d => `
    <button class="day-btn ${d.id === state.day ? 'selected' : ''}" data-day="${d.id}">${d.label}</button>
  `).join('');
  el.querySelectorAll('button').forEach(btn => {
    btn.addEventListener('click', () => {
      state.day = btn.dataset.day;
      state.split = null;
      ensureSplitForToday();
      renderAll();
      saveToday();
    });
  });
}

function renderMetrics() {
  const dt = dayTypes.find(d => d.id === state.day);
  const consumedCal = state.foods.filter(f => f.checked).reduce((s, f) => s + f.calories, 0);
  const consumedProtein = state.foods.filter(f => f.checked).reduce((s, f) => s + f.protein, 0);
  const remainCal = dt.calories - consumedCal;
  const remainProtein = dt.protein - consumedProtein;

  const cards = [
    { label: 'Workout', value: dt.workouts.join(' + ') }
  ];
  if (state.split) {
    const splitInfo = strengthSplits.find(s => s.name === state.split);
    cards.push({ label: "Today's strength focus", value: state.split + ' — ' + splitInfo.detail });
  }
  cards.push(
    { label: 'Calorie target', value: dt.calories.toLocaleString() },
    { label: 'Protein target', value: dt.protein + ' g' },
    { label: 'Eaten', value: Math.round(consumedCal).toLocaleString() + ' cal · ' + Math.round(consumedProtein) + ' g' },
    { label: remainCal >= 0 ? 'Calories left' : 'Calories over', value: Math.abs(Math.round(remainCal)).toLocaleString() },
    { label: remainProtein >= 0 ? 'Protein left' : 'Protein over', value: Math.abs(Math.round(remainProtein)) + ' g' }
  );

  document.getElementById('metrics').innerHTML = cards.map(c => `
    <div class="metric-card">
      <p class="metric-label">${c.label}</p>
      <p class="metric-value">${c.value}</p>
    </div>
  `).join('');

  const existingOverride = document.getElementById('split-override');
  if (existingOverride) existingOverride.remove();

  if (state.split) {
    const overrideHtml = `
      <div id="split-override" style="margin: -10px 0 20px;">
        <p class="metric-label" style="margin-bottom:6px;">Train something else instead</p>
        <div style="display:flex; gap:6px; flex-wrap:wrap;">
          ${strengthSplits.map(s => `
            <button class="split-override-btn" data-split="${s.name}"
              style="font-size:12px; padding:6px 10px; border-radius:8px; border:1px solid var(--border);
              background:${s.name === state.split ? 'var(--magenta-light)' : 'var(--card)'};
              color:${s.name === state.split ? 'var(--magenta)' : 'var(--text)'}; cursor:pointer;">
              ${s.name}
            </button>`).join('')}
        </div>
      </div>`;
    document.getElementById('metrics').insertAdjacentHTML('afterend', overrideHtml);
    document.querySelectorAll('.split-override-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        state.split = btn.dataset.split;
        upsertSplitLog(state.split);
        renderMetrics();
        saveToday();
      });
    });
  }
}

function renderFoodList() {
  const el = document.getElementById('food-list');
  const seenTimes = new Set();
  let html = '';
  state.foods.forEach((f, i) => {
    if (f.time && !seenTimes.has(f.time)) {
      seenTimes.add(f.time);
      html += `<p style="font-size:12px; font-weight:600; color: var(--text-secondary); margin: 10px 0 2px;">${f.time}</p>`;
    }
    html += `
      <label class="food-row">
        <span style="display:flex; align-items:center; gap:8px;">
          <input type="checkbox" data-idx="${i}" ${f.checked ? 'checked' : ''}>
          <span class="food-name">${f.name}</span>
        </span>
        <span style="display:flex; align-items:center; gap:6px;">
          <span class="food-stats">${f.calories} cal · ${f.protein} g</span>
          ${f.custom ? `<button class="remove-btn" data-remove="${i}" title="Remove">✕</button>` : ''}
        </span>
      </label>`;
  });
  el.innerHTML = html;
  el.querySelectorAll('input[type=checkbox]').forEach(cb => {
    cb.addEventListener('change', () => {
      state.foods[Number(cb.dataset.idx)].checked = cb.checked;
      renderMetrics();
      saveToday();
    });
  });
  el.querySelectorAll('[data-remove]').forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.preventDefault();
      state.foods.splice(Number(btn.dataset.remove), 1);
      renderAll();
      saveToday();
    });
  });
}

function renderWorkoutPlan() {
  const el = document.getElementById('workout-plan');
  let exercises = [];
  if (state.day === 'strength' || state.day === 'both') {
    const splitInfo = strengthSplits.find(s => s.name === state.split) || strengthSplits[0];
    exercises = splitInfo.exercises;
    if (state.day === 'both') exercises = otherWorkoutPlans.zumba.concat(exercises);
  } else if (state.day === 'zumba') {
    exercises = otherWorkoutPlans.zumba;
  } else {
    exercises = otherWorkoutPlans.rest;
  }
  el.innerHTML = `
    <div style="background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 12px 14px;">
      <ul style="margin:0; padding-left: 18px; font-size:14px; line-height:1.7;">
        ${exercises.map(e => `<li>${e}</li>`).join('')}
      </ul>
    </div>`;
}

function renderWellness() {
  const el = document.getElementById('wellness-list');
  el.innerHTML = wellnessItems.map(item => {
    if (item.type === 'counter') {
      const val = state.wellness[item.id] || 0;
      return `
        <div class="food-row" style="cursor:default;">
          <span class="food-name">${item.label}</span>
          <span style="display:flex; align-items:center; gap:10px;">
            <button class="wellness-dec" data-id="${item.id}" style="border:1px solid var(--border); background:var(--card); border-radius:6px; width:26px; height:26px; cursor:pointer;">-</button>
            <span class="food-stats" style="min-width:70px; text-align:center;">${val} / ${item.goal} ${item.unit}</span>
            <button class="wellness-inc" data-id="${item.id}" style="border:1px solid var(--border); background:var(--card); border-radius:6px; width:26px; height:26px; cursor:pointer;">+</button>
          </span>
        </div>`;
    }
    return `
      <label class="food-row">
        <span class="food-name">${item.label}</span>
        <input type="checkbox" data-wellness="${item.id}" ${state.wellness[item.id] ? 'checked' : ''}>
      </label>`;
  }).join('');

  el.querySelectorAll('[data-wellness]').forEach(cb => {
    cb.addEventListener('change', () => {
      state.wellness[cb.dataset.wellness] = cb.checked;
      saveToday();
    });
  });
  el.querySelectorAll('.wellness-inc').forEach(btn => {
    btn.addEventListener('click', () => {
      state.wellness[btn.dataset.id] = (state.wellness[btn.dataset.id] || 0) + 1;
      renderWellness();
      saveToday();
    });
  });
  el.querySelectorAll('.wellness-dec').forEach(btn => {
    btn.addEventListener('click', () => {
      state.wellness[btn.dataset.id] = Math.max(0, (state.wellness[btn.dataset.id] || 0) - 1);
      renderWellness();
      saveToday();
    });
  });
}

function scanAllEntries(daysBack) {
  const out = [];
  for (let offset = 0; offset < daysBack; offset++) {
    try {
      const raw = localStorage.getItem(dateKey(offset));
      if (raw) {
        const parsed = JSON.parse(raw);
        if (parsed && Array.isArray(parsed.foods)) out.push(parsed);
      }
    } catch (e) { /* skip bad entry */ }
  }
  return out;
}

function runSmartFoodUpdate() {
  const statusEl = document.getElementById('smart-update-status');
  const entries = scanAllEntries(60);
  if (entries.length < 3) {
    statusEl.textContent = 'Need at least 3 logged days before I can spot a pattern — keep checking things off and check back.';
    return;
  }
  const totalDays = entries.length;
  const libraryChecked = {};
  const customStats = {};
  entries.forEach(entry => {
    entry.foods.forEach(f => {
      if (f.custom) {
        if (!customStats[f.name]) customStats[f.name] = { count: 0, calories: f.calories, protein: f.protein };
        if (f.checked) customStats[f.name].count++;
      } else {
        libraryChecked[f.name] = (libraryChecked[f.name] || 0) + (f.checked ? 1 : 0);
      }
    });
  });

  let library = loadFoodLibrary();
  const removedNames = [];
  library = library.filter(f => {
    const rate = (libraryChecked[f.name] || 0) / totalDays;
    if (rate < 0.15) { removedNames.push(f.name); return false; }
    return true;
  });

  const addedNames = [];
  Object.keys(customStats).forEach(name => {
    const stat = customStats[name];
    if (stat.count >= 3 && !library.find(f => f.name === name)) {
      library.push({ name, calories: stat.calories, protein: stat.protein });
      addedNames.push(name);
    }
  });

  saveFoodLibrary(library);

  addedNames.forEach(name => {
    if (!state.foods.find(f => f.name === name)) {
      const item = library.find(f => f.name === name);
      state.foods.push({ ...item, checked: false });
    }
  });
  state.foods = state.foods.filter(f => !(removedNames.includes(f.name) && !f.checked));

  renderAll();
  saveToday();

  const parts = [];
  if (addedNames.length) parts.push('Added: ' + addedNames.join(', '));
  if (removedNames.length) parts.push('Removed: ' + removedNames.join(', '));
  statusEl.textContent = parts.length ? parts.join(' · ') : 'No changes — your list already matches your habits.';
}

function renderAll() {
  renderDayButtons();
  renderMetrics();
  renderWorkoutPlan();
  renderWellness();
  renderFoodList();
}

document.getElementById('add-food-btn').addEventListener('click', () => {
  const nameEl = document.getElementById('new-name');
  const calEl = document.getElementById('new-cal');
  const proteinEl = document.getElementById('new-protein');
  const name = nameEl.value.trim();
  const calories = Number(calEl.value);
  const protein = Number(proteinEl.value) || 0;
  if (!name || !calories) return;
  state.foods.push({ name, calories, protein, checked: true, custom: true, time: 'Added today' });
  nameEl.value = '';
  calEl.value = '';
  proteinEl.value = '';
  renderAll();
  saveToday();
});

document.getElementById('smart-update-btn').addEventListener('click', runSmartFoodUpdate);

function renderWeek() {
  const el = document.getElementById('week-list');
  let html = '';
  for (let offset = 0; offset < 7; offset++) {
    const label = labelForOffset(offset);
    let entry = null;
    if (offset === 0) {
      entry = state;
    } else {
      try {
        const raw = localStorage.getItem(dateKey(offset));
        if (raw) entry = JSON.parse(raw);
      } catch (e) { entry = null; }
    }
    if (!entry) {
      html += `
        <div class="week-row">
          <span class="week-day">${label}</span>
          <span class="week-stats" style="color:#a39d92;">No entry</span>
        </div>`;
      continue;
    }
    const dt = dayTypes.find(d => d.id === entry.day) || dayTypes[0];
    const cal = entry.foods.filter(f => f.checked).reduce((s, f) => s + f.calories, 0);
    const protein = entry.foods.filter(f => f.checked).reduce((s, f) => s + f.protein, 0);
    const typeLabel = entry.split ? dt.label + ' (' + entry.split + ')' : dt.label;
    html += `
      <div class="week-row">
        <span class="week-day">${label}</span>
        <span class="week-type">${typeLabel}</span>
        <span class="week-stats">${Math.round(cal)} / ${dt.calories} cal · ${Math.round(protein)} / ${dt.protein} g</span>
      </div>`;
  }
  el.innerHTML = html;
}

document.getElementById('tab-today').addEventListener('click', () => {
  document.getElementById('view-today').style.display = '';
  document.getElementById('view-week').style.display = 'none';
  document.getElementById('tab-today').classList.add('active');
  document.getElementById('tab-week').classList.remove('active');
});
document.getElementById('tab-week').addEventListener('click', () => {
  document.getElementById('view-today').style.display = 'none';
  document.getElementById('view-week').style.display = '';
  document.getElementById('tab-week').classList.add('active');
  document.getElementById('tab-today').classList.remove('active');
  renderWeek();
});

loadToday();
</script>
