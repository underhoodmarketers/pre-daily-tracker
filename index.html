<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily workout &amp; nutrition tracker</title>
<style>
  :root {
    --bg: #fdfaf6;
    --card: #ffffff;
    --border: #e8e1d8;
    --text: #2c2420;
    --text-secondary: #756a60;
    --magenta: #b3286e;
    --saffron: #e0791f;
    --gold: #c79a2f;
    --magenta-light: #f7e7ef;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: var(--bg);
    color: var(--text);
    padding: 24px 16px 60px;
  }
  .wrap { max-width: 720px; margin: 0 auto; }
  h1 {
    font-size: 22px;
    font-weight: 600;
    margin: 0 0 4px;
    color: var(--magenta);
  }
  .subtitle { font-size: 14px; color: var(--text-secondary); margin: 0 0 24px; }
  .tabs { display: flex; gap: 8px; margin-bottom: 20px; border-bottom: 1px solid var(--border); }
  .tab-btn {
    border: none; background: none; padding: 10px 4px; font-size: 14px;
    color: var(--text-secondary); cursor: pointer; border-bottom: 2px solid transparent;
  }
  .tab-btn.active { color: var(--magenta); border-bottom-color: var(--magenta); font-weight: 600; }
  .day-grid {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 8px; margin-bottom: 24px;
  }
  .day-btn {
    border: 1px solid var(--border); background: var(--card); border-radius: 10px;
    padding: 10px 8px; font-size: 14px; cursor: pointer; color: var(--text);
  }
  .day-btn.selected {
    border: 2px solid var(--magenta); background: var(--magenta-light); color: var(--magenta); font-weight: 600;
  }
  .metrics {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 10px; margin-bottom: 24px;
  }
  .metric-card { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 12px; }
  .metric-label { font-size: 12px; color: var(--text-secondary); margin: 0 0 4px; }
  .metric-value { font-size: 17px; font-weight: 600; margin: 0; }
  .section-label { font-size: 13px; color: var(--text-secondary); margin: 0 0 8px; font-weight: 600; }
  .food-list { display: flex; flex-direction: column; gap: 6px; margin-bottom: 16px; }
  .food-row {
    display: flex; align-items: center; justify-content: space-between; gap: 8px;
    padding: 10px 12px; border: 1px solid var(--border); border-radius: 10px;
    background: var(--card); cursor: pointer;
  }
  .food-row input[type=checkbox] { width: 17px; height: 17px; accent-color: var(--magenta); }
  .food-name { font-size: 14px; }
  .food-stats { font-size: 12px; color: var(--text-secondary); white-space: nowrap; }
  .add-row { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; border-top: 1px solid var(--border); padding-top: 14px; }
  input[type=text], input[type=number] {
    border: 1px solid var(--border); border-radius: 8px; padding: 9px 10px; font-size: 14px;
  }
  #new-name { flex: 2; min-width: 120px; }
  #new-cal, #new-protein { flex: 1; min-width: 80px; }
  button.add-btn {
    background: var(--magenta); color: #fff; border: none; border-radius: 8px;
    padding: 10px 16px; font-size: 14px; cursor: pointer; font-weight: 600;
  }
  button.add-btn:hover { background: #94215a; }
  #save-status { font-size: 12px; color: var(--text-secondary); margin: 10px 0 0; }
  .week-row {
    display: flex; align-items: center; justify-content: space-between; gap: 8px;
    padding: 12px; border: 1px solid var(--border); border-radius: 10px; background: var(--card);
    margin-bottom: 8px; flex-wrap: wrap;
  }
  .week-day { font-size: 14px; font-weight: 600; min-width: 90px; }
  .week-type { font-size: 13px; color: var(--text-secondary); flex: 1; }
  .week-stats { font-size: 13px; color: var(--text-secondary); }
  .remove-btn {
    border: none; background: none; color: var(--text-secondary); cursor: pointer;
    font-size: 14px; padding: 2px 6px;
  }
</style>
</head>
<body>
<div class="wrap">
  <h1>Daily tracker</h1>
  <p class="subtitle">Pick today's workout, log what you eat, see what's left.</p>

  <div class="tabs">
    <button class="tab-btn active" id="tab-today">Today</button>
    <button class="tab-btn" id="tab-week">This week</button>
  </div>

  <div id="view-today">
    <p class="section-label">Today's workout</p>
    <div class="day-grid" id="day-buttons"></div>

    <div class="metrics" id="metrics"></div>

    <p class="section-label">Food log — check what you've eaten</p>
    <div class="food-list" id="food-list"></div>

    <div class="add-row">
      <input type="text" id="new-name" placeholder="Food name">
      <input type="number" id="new-cal" placeholder="Calories">
      <input type="number" id="new-protein" placeholder="Protein (g)">
      <button class="add-btn" id="add-food-btn">Add food</button>
    </div>
    <p id="save-status"></p>
  </div>

  <div id="view-week" style="display:none;">
    <div id="week-list"></div>
  </div>
</div>

<script>
const STORAGE_PREFIX = 'holisticrhythm-tracker-';
const SPLIT_LOG_KEY = 'holisticrhythm-tracker-split-log';

const strengthSplits = [
  { name: 'Push', detail: 'Chest, shoulders, triceps' },
  { name: 'Legs', detail: 'Quads, hamstrings, glutes, calves' },
  { name: 'Pull', detail: 'Back, biceps' },
  { name: 'Full body + core', detail: 'Compound lifts, core' }
];

function loadSplitLog() {
  try {
    const raw = localStorage.getItem(SPLIT_LOG_KEY);
    return raw ? JSON.parse(raw) : [];
  } catch (e) { return []; }
}

function saveSplitLog(log) {
  try { localStorage.setItem(SPLIT_LOG_KEY, JSON.stringify(log)); } catch (e) { /* ignore */ }
}

function todayDateStr() {
  return new Date().toISOString().slice(0, 10);
}

function getSuggestedSplit() {
  const log = loadSplitLog().filter(e => e.date !== todayDateStr());
  if (log.length === 0) return strengthSplits[0].name;
  log.sort((a, b) => (a.date < b.date ? 1 : -1));
  const lastIdx = strengthSplits.findIndex(s => s.name === log[0].split);
  const nextIdx = lastIdx === -1 ? 0 : (lastIdx + 1) % strengthSplits.length;
  return strengthSplits[nextIdx].name;
}

function upsertSplitLog(splitName) {
  const log = loadSplitLog().filter(e => e.date !== todayDateStr());
  log.push({ date: todayDateStr(), split: splitName });
  saveSplitLog(log);
}

function removeTodaySplitLog() {
  const log = loadSplitLog().filter(e => e.date !== todayDateStr());
  saveSplitLog(log);
}

const dayTypes = [
  { id: 'rest', label: 'Rest day', calories: 1550, protein: 110, workouts: ['Rest — recovery day'] },
  { id: 'zumba', label: 'Zumba only', calories: 1700, protein: 120, workouts: ['Bollywood Zumba class'] },
  { id: 'strength', label: 'Strength only', calories: 1750, protein: 130, workouts: ['Strength training session'] },
  { id: 'both', label: 'Strength + Zumba', calories: 1900, protein: 140, workouts: ['Strength training session', 'Bollywood Zumba class'] }
];

const defaultFoods = [
  { name: 'Oikos Pro yogurt', calories: 160, protein: 25 },
  { name: 'Isopure Clear protein (Zumba)', calories: 90, protein: 20 },
  { name: 'Siete almond flour tortilla', calories: 150, protein: 4 },
  { name: 'Chicken breast, 6 oz', calories: 280, protein: 53 },
  { name: '2 large eggs', calories: 140, protein: 12 },
  { name: 'Cooked rice, 1 cup', calories: 205, protein: 4 },
  { name: 'Avocado, half', calories: 120, protein: 1 },
  { name: 'Almonds, 1 oz', calories: 165, protein: 6 },
  { name: 'Protein shake (whey)', calories: 130, protein: 25 },
  { name: 'Mixed vegetables, 1 cup', calories: 60, protein: 3 }
];

function dateKey(offsetDays) {
  const d = new Date();
  d.setDate(d.getDate() - (offsetDays || 0));
  return STORAGE_PREFIX + d.toISOString().slice(0, 10);
}
function labelForOffset(offset) {
  const d = new Date();
  d.setDate(d.getDate() - offset);
  return offset === 0 ? 'Today' : d.toLocaleDateString(undefined, { weekday: 'short', month: 'short', day: 'numeric' });
}

let state = { day: 'zumba', foods: defaultFoods.map(f => ({ ...f, checked: false })) };

function loadToday() {
  try {
    const raw = localStorage.getItem(dateKey(0));
    if (raw) {
      const parsed = JSON.parse(raw);
      if (parsed && parsed.day && Array.isArray(parsed.foods)) state = parsed;
    }
  } catch (e) { /* use defaults */ }
  ensureSplitForToday();
  renderAll();
}

function saveToday() {
  try {
    localStorage.setItem(dateKey(0), JSON.stringify(state));
    document.getElementById('save-status').textContent = 'Saved';
  } catch (e) {
    document.getElementById('save-status').textContent = 'Could not save in this browser.';
  }
}

function ensureSplitForToday() {
  const includesStrength = state.day === 'strength' || state.day === 'both';
  if (includesStrength) {
    if (!state.split) {
      state.split = getSuggestedSplit();
    }
    upsertSplitLog(state.split);
  } else {
    state.split = null;
    removeTodaySplitLog();
  }
}

function renderDayButtons() {
  const el = document.getElementById('day-buttons');
  el.innerHTML = dayTypes.map(d => `
    <button class="day-btn ${d.id === state.day ? 'selected' : ''}" data-day="${d.id}">${d.label}</button>
  `).join('');
  el.querySelectorAll('button').forEach(btn => {
    btn.addEventListener('click', () => {
      state.day = btn.dataset.day;
      state.split = null;
      ensureSplitForToday();
      renderAll();
      saveToday();
    });
  });
}

function renderMetrics() {
  const dt = dayTypes.find(d => d.id === state.day);
  const consumedCal = state.foods.filter(f => f.checked).reduce((s, f) => s + f.calories, 0);
  const consumedProtein = state.foods.filter(f => f.checked).reduce((s, f) => s + f.protein, 0);
  const remainCal = dt.calories - consumedCal;
  const remainProtein = dt.protein - consumedProtein;

  const cards = [
    { label: 'Workout', value: dt.workouts.join(' + ') }
  ];
  if (state.split) {
    const splitInfo = strengthSplits.find(s => s.name === state.split);
    cards.push({ label: "Today's strength focus", value: state.split + ' — ' + splitInfo.detail });
  }
  cards.push(
    { label: 'Calorie target', value: dt.calories.toLocaleString() },
    { label: 'Protein target', value: dt.protein + ' g' },
    { label: 'Eaten', value: Math.round(consumedCal).toLocaleString() + ' cal · ' + Math.round(consumedProtein) + ' g' },
    { label: remainCal >= 0 ? 'Calories left' : 'Calories over', value: Math.abs(Math.round(remainCal)).toLocaleString() },
    { label: remainProtein >= 0 ? 'Protein left' : 'Protein over', value: Math.abs(Math.round(remainProtein)) + ' g' }
  );

  document.getElementById('metrics').innerHTML = cards.map(c => `
    <div class="metric-card">
      <p class="metric-label">${c.label}</p>
      <p class="metric-value">${c.value}</p>
    </div>
  `).join('');

  const existingOverride = document.getElementById('split-override');
  if (existingOverride) existingOverride.remove();

  if (state.split) {
    const overrideHtml = `
      <div id="split-override" style="margin: -10px 0 20px;">
        <p class="metric-label" style="margin-bottom:6px;">Train something else instead</p>
        <div style="display:flex; gap:6px; flex-wrap:wrap;">
          ${strengthSplits.map(s => `
            <button class="split-override-btn" data-split="${s.name}"
              style="font-size:12px; padding:6px 10px; border-radius:8px; border:1px solid var(--border);
              background:${s.name === state.split ? 'var(--magenta-light)' : 'var(--card)'};
              color:${s.name === state.split ? 'var(--magenta)' : 'var(--text)'}; cursor:pointer;">
              ${s.name}
            </button>`).join('')}
        </div>
      </div>`;
    document.getElementById('metrics').insertAdjacentHTML('afterend', overrideHtml);
    document.querySelectorAll('.split-override-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        state.split = btn.dataset.split;
        upsertSplitLog(state.split);
        renderMetrics();
        saveToday();
      });
    });
  }
}

function renderFoodList() {
  const el = document.getElementById('food-list');
  el.innerHTML = state.foods.map((f, i) => `
    <label class="food-row">
      <span style="display:flex; align-items:center; gap:8px;">
        <input type="checkbox" data-idx="${i}" ${f.checked ? 'checked' : ''}>
        <span class="food-name">${f.name}</span>
      </span>
      <span style="display:flex; align-items:center; gap:6px;">
        <span class="food-stats">${f.calories} cal · ${f.protein} g</span>
        ${f.custom ? `<button class="remove-btn" data-remove="${i}" title="Remove">✕</button>` : ''}
      </span>
    </label>
  `).join('');
  el.querySelectorAll('input[type=checkbox]').forEach(cb => {
    cb.addEventListener('change', () => {
      state.foods[Number(cb.dataset.idx)].checked = cb.checked;
      renderMetrics();
      saveToday();
    });
  });
  el.querySelectorAll('[data-remove]').forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.preventDefault();
      state.foods.splice(Number(btn.dataset.remove), 1);
      renderAll();
      saveToday();
    });
  });
}

function renderAll() {
  renderDayButtons();
  renderMetrics();
  renderFoodList();
}

document.getElementById('add-food-btn').addEventListener('click', () => {
  const nameEl = document.getElementById('new-name');
  const calEl = document.getElementById('new-cal');
  const proteinEl = document.getElementById('new-protein');
  const name = nameEl.value.trim();
  const calories = Number(calEl.value);
  const protein = Number(proteinEl.value) || 0;
  if (!name || !calories) return;
  state.foods.push({ name, calories, protein, checked: true, custom: true });
  nameEl.value = '';
  calEl.value = '';
  proteinEl.value = '';
  renderAll();
  saveToday();
});

function renderWeek() {
  const el = document.getElementById('week-list');
  let html = '';
  for (let offset = 0; offset < 7; offset++) {
    const label = labelForOffset(offset);
    let entry = null;
    if (offset === 0) {
      entry = state;
    } else {
      try {
        const raw = localStorage.getItem(dateKey(offset));
        if (raw) entry = JSON.parse(raw);
      } catch (e) { entry = null; }
    }
    if (!entry) {
      html += `
        <div class="week-row">
          <span class="week-day">${label}</span>
          <span class="week-stats" style="color:#a39d92;">No entry</span>
        </div>`;
      continue;
    }
    const dt = dayTypes.find(d => d.id === entry.day) || dayTypes[0];
    const cal = entry.foods.filter(f => f.checked).reduce((s, f) => s + f.calories, 0);
    const protein = entry.foods.filter(f => f.checked).reduce((s, f) => s + f.protein, 0);
    const typeLabel = entry.split ? dt.label + ' (' + entry.split + ')' : dt.label;
    html += `
      <div class="week-row">
        <span class="week-day">${label}</span>
        <span class="week-type">${typeLabel}</span>
        <span class="week-stats">${Math.round(cal)} / ${dt.calories} cal · ${Math.round(protein)} / ${dt.protein} g</span>
      </div>`;
  }
  el.innerHTML = html;
}

document.getElementById('tab-today').addEventListener('click', () => {
  document.getElementById('view-today').style.display = '';
  document.getElementById('view-week').style.display = 'none';
  document.getElementById('tab-today').classList.add('active');
  document.getElementById('tab-week').classList.remove('active');
});
document.getElementById('tab-week').addEventListener('click', () => {
  document.getElementById('view-today').style.display = 'none';
  document.getElementById('view-week').style.display = '';
  document.getElementById('tab-week').classList.add('active');
  document.getElementById('tab-today').classList.remove('active');
  renderWeek();
});

loadToday();
</script>
</body>
</html>
